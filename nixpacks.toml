# Railway / Nixpacks Build Configuration
# Docs: https://nixpacks.com/docs/providers/php

providers = ["php"]

[variables]
PHP_VERSION = "8.3"
PHP_CLI_SERVER_WORKERS = "4"

# ── Phase 1: Install dependencies ─────────────────────────────────────────
[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction"
]

# ── Phase 2: Build / Cache ─────────────────────────────────────────────────
[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
    "php artisan event:cache",
]

# ── Start: Migrate → Serve ─────────────────────────────────────────────────
# migrate --force  = safe to run on every deploy (idempotent)
# --host 0.0.0.0   = required for Railway to receive traffic
# --port $PORT     = Railway assigns port via env var
[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
